<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyve Ninja - El ile Kes!</title>
    <meta name="copyright" content="© 2026 Hakan Çetin - Tüm hakları saklıdır">

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net; font-src 'self'; object-src 'none'; base-uri 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(), geolocation=(), fullscreen=(self)">

    <link rel="stylesheet" href="static/css/style.css">
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <!-- Security Script -->
    <script>
        // Domain Locking
        const ALLOWED_DOMAINS = ['hakancetin.com.tr', 'hakancetin.github.io', 'localhost', '127.0.0.1'];
        const currentDomain = window.location.hostname;

        if (!ALLOWED_DOMAINS.includes(currentDomain)) {
            alert('⚠️ Bu oyun yetkisiz kullanımdır.\nLütfen hakancetin.com.tr adresini kullanın.');
            window.location.href = 'https://hakancetin.com.tr';
        }

        // Anti-Debugging (F12)
        let devtools = { open: false };
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        setInterval(() => {
            if (isMobile) return; // Skip on mobile
            const threshold = 250;
            if (window.outerWidth - window.innerWidth > threshold ||
                window.outerHeight - window.innerHeight > threshold) {
                if (!devtools.open) {
                    devtools.open = true;
                    alert('⚠️ Developer tools kullanımı yasaktır!');
                    window.location.href = 'https://hakancetin.com.tr';
                }
            } else {
                devtools.open = false;
            }
        }, 3000); // 3 saniyede bir kontrol (performans için)

        // Console Protection
        console.log('%c⚠️ Meyve Ninja Korumalıdır!', 'color: red; font-size: 20px; font-weight: bold;');
        console.log('%c© 2026 Hakan Çetin - Tüm hakları saklıdır.', 'color: #00ff88; font-size: 14px;');
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <video id="input-video" style="display:none;"></video>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div id="score">0</div>
            <div id="lives">
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
            </div>
            <div id="timer">0s</div>
        </div>
        
        <!-- Combo Display -->
        <div id="combo-display"></div>

        <!-- Gesture Progress -->
        <div id="gesture-progress" class="hidden">
            <div class="progress-bar">
                <div class="progress-bar-fill"></div>
            </div>
            <p>Yumruk tutun (0.5s)...</p>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1>🍉 Meyve Ninja</h1>
            <p>El hareketlerinizle meyveleri kesin!</p>
            <p>Kameraya izin verin ve işaret parmağınızı kullanın</p>
            <p style="color: #ffdc3c; margin-top: 20px;">� Yumruk yaparak başlayın</p>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1>OYUN BİTTİ</h1>
            <p id="final-score">Puan: 0</p>
            <p style="color: #ffdc3c; margin-top: 20px;">👊 Yumruk yaparak tekrar oynayın</p>
            <p id="gesture-hint" style="color: #888; font-size: 16px; margin-top: 10px;">Tüm parmaklarınızı bükün</p>
        </div>
        
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen hidden">
            <div class="spinner"></div>
            <p>Kamera başlatılıyor...</p>
        </div>
    </div>
    
    <script src="static/js/game.js"></script>
</body>
</html>
